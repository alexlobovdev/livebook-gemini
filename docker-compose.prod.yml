services:
  traefik:
    image: traefik:v3.6
    container_name: gemini_traefik
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.storage=/acme/acme.json
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@liveboook.ru}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/acme
    networks:
      - gemini
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gemini_app
    working_dir: /var/www/app
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: db
      REDIS_HOST: redis
      QUEUE_CONNECTION: ${GEMINI_QUEUE_CONNECTION:-redis}
      REDIS_QUEUE: ${REDIS_QUEUE:-gemini-process}
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-2100}
    volumes:
      - ./:/var/www/app
    depends_on:
      - db
      - redis
    networks:
      - gemini
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gemini_worker
    working_dir: /var/www/app
    command: >
      sh -c "php artisan queue:work redis
      --queue=gemini-process,default
      --tries=${GEMINI_JOB_TRIES:-3}
      --timeout=${GEMINI_JOB_TIMEOUT_SECONDS:-1800}
      --sleep=2
      --verbose
      --memory=768"
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_HOST: db
      REDIS_HOST: redis
      QUEUE_CONNECTION: ${GEMINI_QUEUE_CONNECTION:-redis}
      REDIS_QUEUE: ${REDIS_QUEUE:-gemini-process}
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-2100}
    volumes:
      - ./:/var/www/app
    depends_on:
      - app
      - db
      - redis
    networks:
      - gemini
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: gemini_nginx
    volumes:
      - ./:/var/www/app:ro
    depends_on:
      - app
    labels:
      - traefik.enable=true
      - traefik.docker.network=gemini
      - traefik.http.services.gemini.loadbalancer.server.port=80
      - traefik.http.routers.gemini.rule=Host(`${GEMINI_DOMAIN:-gemini.crm.liveboook.ru}`)
      - traefik.http.routers.gemini.entrypoints=websecure
      - traefik.http.routers.gemini.tls=true
      - traefik.http.routers.gemini.tls.certresolver=letsencrypt
      - traefik.http.routers.gemini-http.rule=Host(`${GEMINI_DOMAIN:-gemini.crm.liveboook.ru}`)
      - traefik.http.routers.gemini-http.entrypoints=web
      - traefik.http.routers.gemini-http.service=gemini
      - traefik.http.routers.gemini-http.middlewares=redirect-gemini
      - traefik.http.middlewares.redirect-gemini.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-gemini.redirectscheme.permanent=true
    networks:
      - gemini
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: gemini_db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gemini}
      POSTGRES_USER: ${DB_USERNAME:-gemini}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gemini}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - gemini
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gemini_redis
    env_file:
      - ./.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis_data:/data
    networks:
      - gemini
    restart: unless-stopped

networks:
  gemini:
    driver: bridge

volumes:
  traefik_acme:
  db_data:
  redis_data:
