services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gemini_app
    working_dir: /var/www/app
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      REDIS_QUEUE: ${REDIS_QUEUE:-gemini-process}
    volumes:
      - ./:/var/www/app
    depends_on:
      - db
      - redis
    networks:
      - gemini
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: gemini_worker
    working_dir: /var/www/app
    command: >
      sh -c "php artisan queue:work redis
      --queue=${GEMINI_QUEUE_NAME:-gemini-process}
      --tries=${GEMINI_JOB_TRIES:-3}
      --timeout=${GEMINI_JOB_TIMEOUT_SECONDS:-1800}
      --sleep=2
      --memory=768"
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: db
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
      REDIS_QUEUE: ${REDIS_QUEUE:-gemini-process}
    volumes:
      - ./:/var/www/app
    depends_on:
      - app
      - db
      - redis
    networks:
      - gemini
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile.prod
    container_name: gemini_nginx
    volumes:
      - ./:/var/www/app:ro
    depends_on:
      - app
    ports:
      - "${GEMINI_HTTP_PORT:-8080}:80"
    networks:
      - gemini
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: gemini_db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gemini}
      POSTGRES_USER: ${DB_USERNAME:-gemini}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gemini}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - gemini
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gemini_redis
    env_file:
      - ./.env
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server --appendonly yes; fi"]
    volumes:
      - redis_data:/data
    networks:
      - gemini
    restart: unless-stopped

networks:
  gemini:
    driver: bridge

volumes:
  db_data:
  redis_data:
